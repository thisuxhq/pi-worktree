name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate package.json
        run: |
          test -f package.json
          test -f extensions/git-worktree.ts
          bun -e 'const p = require("./package.json"); if (p.name !== "@thisux/pi-worktree") process.exit(1); if (!p.pi?.extensions?.length) process.exit(1); console.log("ok", p.name, p.version)'
